{% extends 'catalog/base.html' %}

{% block title %}Блог{% endblock %}

{% block content %}
<div class="pricing-header px-3 py-3 pt-md-5 pb-md-4 mx-auto text-center">
    <h1 class="display-4">Блог {{blog.title}}</h1>
</div>
<div class="container ">
        <p>Наименование продукта: {{blog.title}}</p>
        <p>Картинка продукта:</p>
        <img src="{{blog.image.url}}" alt="{{blog.title}}">
        <p>Информация о продукте: {{blog.content}}</p>
        <p>Дата публикации: {{blog.created_at|date:"d M Y"}}</p>

    </div>
{% endblock %}
