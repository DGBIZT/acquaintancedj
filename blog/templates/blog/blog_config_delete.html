{% extends 'catalog/base.html' %}

{% block title %} Удаление блога {% endblock %}

{% block content %}
<div class="pricing-header px-3 py-3 pt-md-5 pb-md-4 mx-auto text-center">
    <h2>Удаление блога {{object.title}}</h2>
    <p>Вы действительно хотите удалить "{{object.title}}</p>
    <form method="post">
        {% csrf_token %} <!-- Обязательно для всех POST-форм -->
        <button type="submit" class="btn btn-danger">Подтвердить</button>
        <a href="{% url 'blog:blog_detail' object.pk %}" class="btn btn-primary">Отменить</a>
    </form>
</div>
{% endblock %}
