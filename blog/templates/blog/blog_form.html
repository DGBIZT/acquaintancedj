{% extends 'catalog/base.html' %}

{% block title %} Форма для блога {% endblock %}

{% block content %}
<div class="pricing-header px-3 py-3 pt-md-5 pb-md-4 mx-auto text-center">
    <h1 class="display-4">Редактирование блога {{blog.title}}</h1>
</div>
<div class="container ">
    <h2>Форма для блога</h2>
    <form method="post"> <!--Что бы форма заработала нужно указывать method="post" -->
        {% csrf_token %} <!-- Обязательно для всех POST-форм -->
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Сохранить</button>
        <a href="{% url 'blog:blog_detail' blog.pk %}" class="btn btn-primary">Отменить</a>
    </form>
</div>

{% endblock %}
