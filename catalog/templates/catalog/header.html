<header>
<div class="d-flex flex-column flex-md-row align-items-center p-3 px-md-4 mb-3 bg-white border-bottom box-shadow">
    <h5 class="my-0 mr-md-auto font-weight-normal">Рынок Онлайн</h5>
    <nav class="ms-5 d-flex">
        <a class="p-2 btn btn-outline-primary me-2" href="/catalog/home">Каталог</a>
        <a class="p-2 btn btn-outline-primary me-2" href="/catalog/contacts/">Контакты</a>
        <a class="p-2 btn btn-outline-primary" href="/blog/blog_list/">Наши блоги</a>
    </nav>
    <div class="ms-auto d-flex flex-wrap">

        {% if user.is_authenticated %}
            <b class="p-2 me-2 " style="color: #0d6efd;">Добро пожаловать {{ user.username }} !</b>
            <form method="post" action="{% url 'users:logout' %}" style="display: inline">
                {% csrf_token %}
                <button type="submit" class="p-2 btn btn-outline-primary me-2">Выйти</button>
            </form>
        {% else %}
            <b class="p-2 me-2" style="color: #0d6efd;">Добро пожаловать на сайт !</b>
            <a class="p-2 btn btn-outline-primary me-2" href="{% url 'users:login' %}">Войти</a>
            <a class="p-2 btn btn-outline-primary" href="{% url 'users:register' %}">Регистрация</a>
        {% endif %}
    </div>
</div>
</header>
